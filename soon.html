<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigTree | Node Deployment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-tech: #3b82f6; /* Bleu Deep Tech raccord avec le reste du site */
            --bg-dark: #0a0a0a;
            --text-light: #f1f2f6;
            --text-grey: #888888;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
        }

        .container { z-index: 10; padding: 20px; max-width: 600px; }

        .tag {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            color: var(--accent-tech);
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin: 10px 0;
            letter-spacing: -2px;
        }

        .status-msg {
            color: var(--text-grey);
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Barre de chargement optimisée */
        .loader-container {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto 40px auto;
            position: relative;
            overflow: hidden;
        }

        .loader-bar {
            position: absolute;
            width: 50%;
            height: 100%;
            background: var(--accent-tech);
            box-shadow: 0 0 15px var(--accent-tech);
            animation: syncLoader 2s infinite ease-in-out;
        }

        @keyframes syncLoader {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 35px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: inline-block;
            font-weight: bold;
        }

        .btn-back:hover {
            background: white;
            color: black;
            transform: translateY(-2px);
        }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <span class="tag">System Module</span>
        <h1>Coming Soon</h1>
        
        <p class="status-msg">
            Technical deployment in progress.<br>
            We are currently finalizing this node. Please check back later for full access.<br>
            Thank you for your patience.
        </p>

        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>

        <a href="index.html" class="btn-back">Return to Menu</a>
    </div>

</body>
</html>
