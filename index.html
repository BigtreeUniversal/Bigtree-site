<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Titre clair et complet pour les moteurs de recherche -->
    <title>BIGTREE CONNECTION | Merging Music • Literature • Arts • Innovation</title>
    
    <!-- Meta Description canonique -->
    <meta name="description" content="BIGTREE CONNECTION - Portail officiel. Merging Music, Literature, Arts & Innovation. Découvrez l'univers Big Tree Connection / Connexion.">
    <meta name="robots" content="index, follow">

    <!-- Signalement de l'URL principale -->
    <link rel="canonical" href="https://bigtreeconnection.com/">

    <!-- Données structurées pour que Google associe toutes les variantes de nom -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BIGTREE CONNECTION",
      "alternateName": ["BigTree Connection", "Big Tree Connection", "Big Tree Connexion", "BigTree, Oliver Bigtree"],
      "url": "https://bigtreeconnection.com/",
      "description": "Merging Music, Literature, Arts & Innovation"
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .intro-container {
            text-align: center;
            cursor: pointer;
            position: relative;
            padding: 20px;
            max-width: 900px;
            text-decoration: none;
            color: inherit;
        }

        h1.logo-animation {
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 15px;
            text-transform: uppercase;
            font-weight: 400;
            margin: 0;
            opacity: 0;
            animation: fadeIn 3s forwards ease-in-out;
            color: #ffffff;
        }

        .seo-tagline {
            font-family: sans-serif;
            font-size: clamp(0.75rem, 2vw, 1rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ccc;
            margin-top: 15px;
            opacity: 0;
            animation: fadeInTagline 2s 1.5s forwards ease-in-out;
        }

        .line-container {
            width: 0;
            height: 1px;
            margin: 25px auto;
            background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c);
            animation: growLine 2s 1s forwards cubic-bezier(0.42, 0, 0.58, 1);
        }

        .enter-btn {
            margin-top: 30px;
            font-family: sans-serif;
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: #888;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInBtn 1s 2.5s forwards;
            transition: color 0.3s;
        }

        .intro-container:hover .enter-btn {
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; letter-spacing: 35px; }
            to { opacity: 1; letter-spacing: 15px; }
        }

        @keyframes fadeInTagline {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes growLine {
            to { width: 100%; }
        }

        @keyframes fadeInBtn { to { opacity: 1; } }
    </style>

    <!-- Redirection JS fluide au lieu du meta-refresh brut qui brouille Google -->
    <script>
        setTimeout(function() {
            window.location.href = "./home/index.html";
        }, 5000); // Redirige après 5 secondes
    </script>
</head>
<body>

    <a href="./home/index.html" class="intro-container">
        <h1 class="logo-animation">BIGTREE CONNECTION</h1>
        <p class="seo-tagline">Merging Music • Literature • Arts • Innovation</p>
        <div class="line-container"></div>
        <div class="enter-btn">Enter the portal</div>
    </a>

</body>
</html>
