<pre id="console" style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
[STATUS] : <span id="status">En attente...</span>
[ DRIFT ] : <span id="drift">0.0000 s</span>
[ LAST  ] : <span id="time">--:--:--</span>
</pre>

<script>
async function updateConsole() {
    try {
        // Le chemin doit correspondre exactement à l'endroit où ton script écrit
        // Assure-toi que c'est bien /xyz/drift_status.json
        const response = await fetch('/xyz/drift_status.json');
        const data = await response.json();
        
        document.getElementById('status').innerText = data.status;
        document.getElementById('status').style.color = "#0f0"; // Vert par défaut
        document.getElementById('drift').innerText = data.drift_offset.toFixed(4) + ' s';
        document.getElementById('time').innerText = new Date().toLocaleTimeString();
    } catch (e) {
        document.getElementById('status').innerText = "CONNEXION PERDUE";
        document.getElementById('status').style.color = "red";
    }
}

// Appel immédiat au chargement de la page
updateConsole();

// Rafraîchissement toutes les 60 secondes (60000 ms)
setInterval(updateConsole, 60000);
</script>
