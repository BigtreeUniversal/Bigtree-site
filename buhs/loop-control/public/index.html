<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BUHS | Dynamic Engine V2 PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030407; --panel: #0d1117; --accent: #00e6ff;
      --accent-glow: rgba(0, 230, 255, 0.3); --text: #c0c6ca; --border: #1a2332;
      --gold: #ffcc00; --danger: #ff3c3c;
    }

    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      font-family: 'Rajdhani', sans-serif; background: var(--bg); 
      color: var(--text); overflow: hidden; display: flex; flex-direction: column; 
    }

    header { 
      height: 50px; padding: 0 20px; background: #0a0e14; 
      border-bottom: 2px solid var(--border); display: flex; 
      justify-content: space-between; align-items: center; flex-shrink: 0; 
    }

    .container { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar - Rack de contrôle */
    .sidebar { 
      width: 320px; background: var(--panel); border-right: 1px solid var(--border); 
      padding: 15px; overflow-y: auto; flex-shrink: 0; 
    }

    .main-content { 
      flex: 1; display: flex; flex-direction: column; background: #05070a; 
      padding: 15px; gap: 15px; overflow: hidden; 
    }

    /* Modules de sorties (KPIs) */
    .display-grid { 
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex-shrink: 0; 
    }

    .module { 
      background: #000; border: 1px solid var(--border); padding: 12px; 
      border-top: 2px solid var(--accent); position: relative; 
    }

    .label-kpi { font-size: 0.65rem; color: #4e5a6a; text-transform: uppercase; display: block; margin-bottom: 4px; }
    .val-kpi { font-family: 'Roboto Mono', monospace; font-size: 1.4rem; color: var(--accent); text-shadow: 0 0 8px var(--accent-glow); }

    /* Zone Graphique */
    .chart-box { 
      flex: 1; background: #000; border: 1px solid var(--border); 
      padding: 10px; position: relative; min-height: 0; 
    }

    /* Styles des entrées (Design Image) */
    .ctrl-group { 
      background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; 
      margin-bottom: 12px; border: 1px solid #1a2332; 
    }

    h3 { font-size: 0.75rem; color: var(--accent); margin: 0 0 10px 0; text-transform: uppercase; border-bottom: 1px solid #1a2332; padding-bottom: 5px; }
    
    label { font-size: 0.7rem; color: #6a7786; display: block; margin-bottom: 3px; }
    
    input[type=number] { 
      width: 90%; background: #000; border: 1px solid var(--border); 
      color: var(--accent); padding: 5px; font-family: 'Roboto Mono'; 
      font-size: 0.8rem; outline: none; 
    }

    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

    /* Boutons */
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .btn { 
      flex: 1; padding: 12px; background: transparent; border: 2px solid var(--border); 
      color: var(--text); font-weight: bold; cursor: pointer; transition: 0.2s; font-family: 'Rajdhani';
    }

    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.primary:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }
    .btn.active { border-color: var(--danger); color: var(--danger); }

    canvas { width: 100%; height: 100%; }
    .muted { font-size: 0.7rem; color: #4e5a6a; }
  </style>
</head>
<body>

  <header>
    <div style="letter-spacing: 2px; font-size: 0.9rem;"><strong>BIGTREE</strong> <span style="color: #4e5a6a;">| HARMONIC SYSTEM V2</span></div>
    <div id="status" style="font-size: 0.7rem; color: #4e5a6a;">READY</div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="ctrl-group">
        <h3>Géométrie Salle</h3>
        <label>Volume (V, m³)</label>
        <input id="inpV" type="number" value="2000"/>
        <label style="margin-top:8px">Surface (S, m²)</label>
        <input id="inpS" type="number" value="800"/>
      </div>

      <div class="ctrl-group">
        <h3>Coefficients</h3>
        <label>Absorption Vide (α₀)</label>
        <input id="inpa0" type="number" step="0.01" value="0.20"/>
        <label style="margin-top:8px">Absorption/Pers (A_p)</label>
        <input id="inpAp" type="number" step="0.05" value="0.50"/>
      </div>

      <div class="ctrl-group">
        <label>Occupants: <span id="labN" style="color:var(--accent)">150</span></label>
        <input id="inpN" type="range" min="0" max="1000" value="150"/>
        <label style="margin-top:8px; display:flex; align-items:center; gap:8px">
          <input id="chkRnd" type="checkbox" /> Fluctuation aléatoire
        </label>
      </div>

      <div class="ctrl-group">
        <h3>Modèle BigTree</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px">
          <div><label>Psi₀</label><input id="inpPsi0" type="number" step="0.01" value="0.85"/></div>
          <div><label>Facteur k</label><input id="inpK" type="number" step="0.0001" value="0.001"/></div>
        </div>
        <label style="margin-top:8px">Lissage λ</label>
        <input id="inpLambda" type="number" step="0.01" value="0.25"/>
        <label style="margin-top:8px">P. Base (W)</label>
        <input id="inpBaseP" type="number" value="1000"/>
      </div>

      <div class="ctrl-group">
        <h3>Calibration Sabine</h3>
        <label>Cible SPL (dB)</label>
        <input id="inpLp" type="number" value="90"/>
        <label style="margin-top:8px">Réf. P₀ (pW)</label>
        <input id="inpP0" type="number" value="1"/>
      </div>

      <div class="btn-row">
        <button class="btn" id="btnReset">RESET</button>
        <button class="btn primary" id="btnStart">DÉMARRER</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="display-grid">
        <div class="module"><span class="label-kpi">Abs. Totale (A)</span><span class="val-kpi" id="kA">—</span></div>
        <div class="module"><span class="label-kpi">T60 (Sabine)</span><span class="val-kpi" id="kT60">—</span></div>
        <div class="module"><span class="label-kpi">P. Requise (W)</span><span class="val-kpi" id="kPwReq">—</span></div>
        <div class="module" style="border-top-color:var(--gold)"><span class="label-kpi">SPL (BigTree)</span><span class="val-kpi" id="kSPL" style="color:var(--gold)">—</span></div>
      </div>
      <div class="display-grid">
        <div class="module"><span class="label-kpi">R Constant</span><span class="val-kpi" id="kR">—</span></div>
        <div class="module"><span class="label-kpi">Psi Corrigé</span><span class="val-kpi" id="kPsi">—</span></div>
        <div class="module"><span class="label-kpi">Pac (BigTree)</span><span class="val-kpi" id="kPac">—</span></div>
        <div class="module"><span class="label-kpi">Delta Psi</span><span class="val-kpi" id="kDpsi">—</span></div>
      </div>

      <div class="chart-box">
        <canvas id="chart"></canvas>
      </div>
      <div class="muted">Tracé temps réel : N (Cyan) vs Puissance Sabine (Vert)</div>
    </main>
  </div>

  <script>
    /* -------------------------------------------------------------------------
       LOGIQUE CORE DUPLIQUÉE À L'IDENTIQUE DE BigTree_Dynamic_Simulator_V2.html
       ------------------------------------------------------------------------- */
    const fmt = (v, unit="") => Number.isFinite(v) ? v.toLocaleString("fr-FR", {maximumFractionDigits: 2}) + (unit? " " + unit : "") : "—";
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    let running = false;
    let psiPrev = 0.85;
    let t = 0;
    const hist = { N:[], Pw:[], t:[] };
    const MAX_LEN = 120;

    const byId = id => document.getElementById(id);
    const el = {
      V: byId("inpV"), S: byId("inpS"), a0: byId("inpa0"), Ap: byId("inpAp"),
      N: byId("inpN"), labN: byId("labN"), rnd: byId("chkRnd"),
      psi0: byId("inpPsi0"), k: byId("inpK"), lambda: byId("inpLambda"), baseP: byId("inpBaseP"),
      Lp: byId("inpLp"), P0: byId("inpP0"),
      A: byId("kA"), T60: byId("kT60"), R: byId("kR"), Pw: byId("kPwReq"),
      Pac: byId("kPac"), Psi: byId("kPsi"), Dpsi: byId("kDpsi"), SPL: byId("kSPL"),
      btnStart: byId("btnStart"), btnReset: byId("btnReset"),
      chart: byId("chart")
    };

    el.N.addEventListener("input", () => el.labN.textContent = el.N.value + " pers.");

    function modelSabine(params){
      const {V,S,a0,Ap,N,LpTarget,P0pW} = params;
      const Aempty = S * a0;
      const A = Aempty + N * Ap;
      const abar = clamp(A / S, 0.001, 0.99);
      const T60 = 0.161 * V / Math.max(A, 0.001);
      const R = A / (1 - abar);
      const Lw = LpTarget - 10 * Math.log10(4 / Math.max(R, 0.001));
      const PrefW = P0pW * 1e-12;
      const Pw = PrefW * Math.pow(10, Lw / 10);
      return {A, abar, T60, R, Lw, Pw};
    }

    function modelBigTree(params){
      const {psi0,k,Ap,N,lambda,baseP} = params;
      const Ah = N * Ap;
      let psiCorr = psi0 - k * Ah;
      psiCorr = clamp(psiCorr, 0.5, 1.2);
      psiCorr = lambda * psiCorr + (1 - lambda) * psiPrev;
      const dPsi = psi0 - psiCorr;
      psiPrev = psiCorr;
      const Pac = baseP * psiCorr;
      const splIndex = 20 * Math.log10(Pac / 0.02);
      return {Ah, psiCorr, dPsi, Pac, splIndex};
    }

    const ctx = el.chart.getContext("2d");
    function drawChart(){
      const W = el.chart.clientWidth, H = el.chart.clientHeight;
      el.chart.width = W * devicePixelRatio; el.chart.height = H * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);
      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = "#1a2332"; ctx.beginPath();
      for(let i=0;i<5;i++){ const y = (H-20) * i/4 + 10; ctx.moveTo(40,y); ctx.lineTo(W-10,y); }
      ctx.stroke();
      const Nmax = Math.max(10, ...hist.N);
      const Pwmax = Math.max(1e-6, ...hist.Pw);
      const m = hist.t.length;
      const x = i => 40 + (W-60) * (i / Math.max(1, m-1));
      const yL = v => (H-20) - (H-40) * (v / Math.max(1, Nmax));
      const yR = v => (H-20) - (H-40) * (Math.log10(v + 1e-12) - Math.log10(Pwmax*1e-6)) / (Math.log10(Pwmax+1e-12) - Math.log10(Pwmax*1e-6) + 1e-6);
      ctx.strokeStyle = "#00e6ff"; ctx.lineWidth = 2; ctx.beginPath();
      for(let i=0;i<m;i++){ const X = x(i), Y = yL(hist.N[i]); if(i===0) ctx.moveTo(X,Y); else ctx.lineTo(X,Y); }
      ctx.stroke();
      ctx.strokeStyle = "#00ffa3"; ctx.beginPath();
      for(let i=0;i<m;i++){ const X = x(i), Y = yR(hist.Pw[i]); if(i===0) ctx.moveTo(X,Y); else ctx.lineTo(X,Y); }
      ctx.stroke();
    }

    /* --- TA LOGIQUE PRO RESTE LA MÊME --- */
// ... (garder toutes tes variables fmt, clamp, hist, el...)

async function step() {
  if(!running) return;

  // 1. Ta simulation aléatoire (si cochée)
  if(el.rnd.checked){
    const N = parseFloat(el.N.value);
    const delta = (Math.random()*0.06 - 0.03) * (parseInt(el.N.max)||1000);
    const n2 = clamp(Math.round(N + delta), 0, parseInt(el.N.max||"1000",10));
    el.N.value = n2; el.labN.textContent = n2 + " pers.";
  }

  // 2. Tes calculs locaux (Sabine & BigTree)
  const pSab = { V: +el.V.value, S: +el.S.value, a0: +el.a0.value, Ap: +el.Ap.value, N: +el.N.value, LpTarget: +el.Lp.value, P0pW: +el.P0.value };
  const s = modelSabine(pSab);
  const pBig = { psi0:+el.psi0.value, k:+el.k.value, Ap:+el.Ap.value, N:+el.N.value, lambda:+el.lambda.value, baseP:+el.baseP.value };
  const b = modelBigTree(pBig);

  // 3. ENVOI AU CLOUD (Render) 
  // On envoie tes résultats au serveur pour "certifier" la session
  fetch('/api/compute', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ occupancy: el.N.value, results: { psi: b.psiCorr, spl: b.splIndex, pac: b.Pac } })
  }).catch(e => console.log("Cloud en attente..."));

  // 4. Mise à jour de ton interface (Tes KPI)
  el.A.textContent = fmt(s.A, "m²"); el.T60.textContent = fmt(s.T60, "s");
  el.R.textContent = fmt(s.R, "m²"); el.Pw.textContent = fmt(s.Pw, "W");
  el.Pac.textContent = fmt(b.Pac, "W"); el.Psi.textContent = fmt(b.psiCorr);
  el.Dpsi.textContent= fmt(b.dPsi); el.SPL.textContent = b.splIndex.toFixed(1) + " dB";

  // 5. Ton Graphique V3
  hist.N.push(+el.N.value); hist.Pw.push(s.Pw); hist.t.push(t++);
  if(hist.N.length > MAX_LEN){ hist.N.shift(); hist.Pw.shift(); hist.t.shift(); }
  drawChart();

  setTimeout(step, 1000);
}

    el.btnStart.addEventListener("click", () => {
      running = !running;
      el.btnStart.textContent = running ? "PAUSE" : "DÉMARRER";
      if(running) { el.btnStart.classList.add('active'); step(); } else { el.btnStart.classList.remove('active'); }
    });

    el.btnReset.addEventListener("click", () => {
      psiPrev = +el.psi0.value;
      hist.N.length = 0; hist.Pw.length = 0; hist.t.length = 0; t = 0;
      drawChart();
    });

    window.onresize = drawChart;
    drawChart();
  </script>
</body>
</html>
