<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>BUHS | Cloud Control Engine V3</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030407; --panel: #0d1117; --accent: #00e6ff;
      --accent-glow: rgba(0, 230, 255, 0.3); --border: #1a2332;
    }

    body {
      background: var(--bg); color: #c0c6ca;
      font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px;
      display: grid; grid-template-columns: 350px 1fr; gap: 20px;
    }

    .panel {
      background: var(--panel); border: 1px solid var(--border);
      padding: 20px; border-radius: 4px; position: relative;
    }

    h2 { color: var(--accent); text-transform: uppercase; font-size: 1.2rem; margin-top: 0; }

    /* Style des Inputs comme ta V3 */
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7; }
    input {
      width: 100%; background: #141920; border: 1px solid var(--border);
      color: #fff; padding: 8px; font-family: 'Roboto Mono', monospace;
    }

    button {
      width: 100%; background: var(--accent); color: #000; border: none;
      padding: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase;
    }

    /* JAUGES DYNAMIQUES */
    .gauge-container {
      display: flex; justify-content: space-around; gap: 20px; margin-top: 20px;
    }
    .gauge {
      flex: 1; height: 150px; background: #141920; border-left: 4px solid var(--border);
      position: relative; display: flex; align-items: flex-end;
    }
    .gauge-fill {
      width: 100%; background: linear-gradient(to top, var(--accent), #0088ff);
      box-shadow: 0 0 15px var(--accent-glow); transition: height 0.3s ease;
    }
    .gauge-label {
      position: absolute; top: -25px; left: 0; font-size: 0.9rem; color: var(--accent);
    }
    .gauge-value {
      position: absolute; bottom: 5px; left: 5px; font-weight: bold; color: #fff;
    }

    #status-bar {
      grid-column: span 2; padding: 10px; background: #0a0e14;
      border: 1px solid var(--accent); color: var(--accent); font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div id="status-bar">BUHS CLOUD ENGINE ACTIVE | ATTENTE CALIBRATION...</div>

  <div class="panel">
    <h2>Calibration Statique</h2>
    <div class="input-group">
      <label>Volume de la Salle (V)</label>
      <input type="number" id="vol" value="500">
    </div>
    <div class="input-group">
      <label>Surface d'Absorption (S)</label>
      <input type="number" id="surf" value="350">
    </div>
    <div class="input-group">
      <label>Facteur Matériaux (Psi_m)</label>
      <input type="number" id="mat" value="0.8" step="0.1">
    </div>
    <button onclick="runCalibration()">Initialiser Point Zéro</button>
  </div>

  <div class="panel">
    <h2>Monitoring Adaptatif (Live)</h2>
    <div class="input-group">
      <label>Densité de Public (Capteur Virtuel)</label>
      <input type="range" id="occ" min="0" max="1000" value="0" oninput="updateLive()">
    </div>

    <div class="gauge-container">
      <div class="gauge">
        <div class="gauge-label">RÉSONANCE Ψ</div>
        <div id="fill-psi" class="gauge-fill" style="height: 0%"></div>
        <div id="val-psi" class="gauge-value">--</div>
      </div>
      <div class="gauge">
        <div class="gauge-label">ÉCART ΔΨ</div>
        <div id="fill-delta" class="gauge-fill" style="height: 0%; background: #ff3c3c;"></div>
        <div id="val-delta" class="gauge-value">--</div>
      </div>
      <div class="gauge">
        <div class="gauge-label">PUISSANCE W</div>
        <div id="fill-watt" class="gauge-fill" style="height: 0%; background: #ffcc00;"></div>
        <div id="val-watt" class="gauge-value">--</div>
      </div>
    </div>
  </div>

  <script>
    async function runCalibration() {
      const data = {
        volume: document.getElementById('vol').value,
        surface: document.getElementById('surf').value,
        materialsFactor: document.getElementById('mat').value
      };
      
      const res = await fetch('/api/calibrate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      
      document.getElementById('status-bar').innerText = 
        `CALIBRATION RÉUSSIE | K: ${result.profile.constants.K.toFixed(0)} N/m² | Ψ_TARGET: ${result.profile.psi_target.toFixed(4)}`;
    }

    async function updateLive() {
      const occ = document.getElementById('occ').value;
      const res = await fetch('/api/compute', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ occupancy: occ, currentPower: 100 })
      });
      
      if(res.ok) {
        const r = await res.json();
        
        // Mise à jour des jauges (hauteur en %)
        document.getElementById('fill-psi').style.height = (r.psi_measured * 1000) + "%";
        document.getElementById('val-psi').innerText = r.psi_measured;

        document.getElementById('fill-delta').style.height = (Math.abs(r.delta_psi) * 2000) + "%";
        document.getElementById('val-delta').innerText = r.delta_psi;

        document.getElementById('fill-watt').style.height = (r.recommended_W / 5) + "%";
        document.getElementById('val-watt').innerText = r.recommended_W + " W";
      }
    }
  </script>
</body>
</html>
