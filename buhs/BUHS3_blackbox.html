<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BUHS | Science du Réel - Analyseur de Structure</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00d2ff; --neon-green: #39ff14; --neon-red: #ff3131; --neon-yellow: #ffea00;
            --bg-dark: #050507; --panel-bg: #111114; --led-off: #1a1a1a;
        }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .console { width: 100%; max-width: 800px; padding: 25px; border: 1px solid #222; border-radius: 8px; background: var(--panel-bg); }
        h2 { color: var(--neon-blue); font-size: 0.9rem; text-align: center; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .field { background: #000; padding: 12px; border: 1px solid #1a1a1a; border-radius: 4px; }
        label { font-size: 0.55rem; color: #666; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { background: none; border: none; color: white; width: 100%; font-family: 'Roboto Mono'; font-size: 1.1rem; outline: none; }
        .slider-wrap { background: #0a0a0c; padding: 15px; border-radius: 4px; margin-bottom: 10px; border-left: 3px solid #333; }
        .slider-wrap.blue { border-color: var(--neon-blue); }
        .slider-wrap.red { border-color: var(--neon-red); }
        input[type=range] { width: 100%; cursor: pointer; height: 6px; background: #222; -webkit-appearance: none; outline: none; }
        .slider-data { display: flex; justify-content: space-between; font-family: 'Roboto Mono'; font-size: 0.75rem; margin-top: 10px; color: #888; }
        .gauges-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .gauge-box { background: #08080a; padding: 15px; border: 1px solid #1a1a1a; border-radius: 4px; }
        .gauge-label { font-size: 0.6rem; color: #aaa; text-align: center; margin-bottom: 10px; }
        .led-bar { display: flex; gap: 3px; height: 14px; background: #000; padding: 4px; border-radius: 3px; }
        .led-segment { flex: 1; background: var(--led-off); border-radius: 1px; }
        .card.main { border-top: 2px solid var(--neon-green); background: #0c0c0e; padding: 20px; text-align: center; }
        .big-val { font-family: 'Roboto Mono'; font-size: 2.2rem; display: block; font-weight: bold; }
    </style>
</head>
<body>
<div class="console">
    <h2>ANALYSEUR DE DYNAMIQUE BUHS v2.1</h2>
    <div class="grid-inputs">
        <div class="field"><label>Masse (kg)</label><input type="text" id="mass" value="10" oninput="calc()"></div>
        <div class="field"><label>Volume (m³)</label><input type="text" id="vol" value="0.0142" oninput="calc()"></div>
        <div class="field"><label>Densité Fluide (kg/m³)</label><input type="text" id="rho" value="1000" oninput="calc()"></div>
    </div>
    <div class="slider-wrap blue">
        <label>Profondeur d'immersion (m)</label>
        <input type="range" id="h" min="0" max="200" step="0.5" value="0" oninput="calc()">
        <div class="slider-data"><span>h: <b id="h-val">0</b> m</span><span>P. Totale Observée: <b id="p-val">101 325</b> Pa</span></div>
    </div>
    <div class="slider-wrap red">
        <label>Seuil de Rupture Structurelle (N)</label>
        <input type="range" id="limit" min="100" max="10000" step="100" value="2000" oninput="calc()">
        <div class="slider-data"><span>Limite: <b id="limit-val">2000</b> N</span></div>
    </div>
    <div class="gauges-container">
        <div class="gauge-box">
            <div class="gauge-label">RATIO DE DENSITÉ (Φ)</div>
            <div class="led-bar" id="gauge-phi"></div>
            <div id="phi-status" style="font-size:0.6rem; text-align:center; margin-top:8px; font-family:'Roboto Mono'">--</div>
        </div>
        <div class="gauge-box">
            <div class="gauge-label">STRESS DE STRUCTURE</div>
            <div class="led-bar" id="gauge-rupture"></div>
            <div id="stress-status" style="font-size:0.6rem; text-align:center; margin-top:8px; font-family:'Roboto Mono'">--</div>
        </div>
    </div>
    <div class="card main">
        <h4 style="font-size: 0.7rem; color: #555;">FORCE DE RÉACTION OBSERVABLE (BUHS)</h4>
        <div id="buhs-val" class="big-val">0.00 N</div>
        <div id="psi-val" style="color:#444; font-size:0.7rem; margin-top:10px; font-family:'Roboto Mono'">Ψ : --</div>
    </div>
</div>
<script>
    function createGauges() {
        const phiBar = document.getElementById('gauge-phi');
        const rupBar = document.getElementById('gauge-rupture');
        phiBar.innerHTML = rupBar.innerHTML = '';
        for(let i=0; i<20; i++) { phiBar.innerHTML += `<div class="led-segment"></div>`; rupBar.innerHTML += `<div class="led-segment"></div>`; }
    }
    function updateLed(id, pct) {
        const segs = document.getElementById(id).getElementsByClassName('led-segment');
        const n = Math.min(Math.round((pct/100)*20), 20);
        for(let i=0; i<20; i++) {
            if(i<n) {
                let c = i>=16 ? '#ff3131' : (i>=12 ? '#ffea00' : '#39ff14');
                segs[i].style.background = c; segs[i].style.boxShadow = `0 0 5px ${c}`;
            } else { segs[i].style.background = '#1a1a1a'; segs[i].style.boxShadow = 'none'; }
        }
    }
    async function calc() {
        const m = document.getElementById('mass').value.replace(',', '.');
        const v = document.getElementById('vol').value.replace(',', '.');
        const rho = document.getElementById('rho').value.replace(',', '.');
        const h = document.getElementById('h').value;
        const limit = parseFloat(document.getElementById('limit').value) || 2000;

        document.getElementById('limit-val').innerText = limit.toLocaleString();
        document.getElementById('h-val').innerText = h;

        try {
            // APPEL AU SERVEUR RENDER (La boîte noire)
            const response = await fetch(`https://buhs-engine.onrender.com/api/v1/buhs-calc?m=${m}&v=${v}&h=${h}&rho=${rho}`);
            const data = await response.json();

            // AFFICHAGE DES RÉSULTATS REÇUS DU SERVEUR
            document.getElementById('p-val').innerText = data.total_pression.toLocaleString();
            document.getElementById('buhs-val').innerText = data.buhs_force + " N";
            document.getElementById('psi-val').innerText = "INDICE DE SYNTONIE (Ψ) : " + data.syntony_psi;
            
            const stress = (parseFloat(data.buhs_force) / limit) * 100;
            
            updateLed('gauge-phi', Math.min((parseFloat(data.ratio_phi) / 2) * 100, 100));
            document.getElementById('phi-status').innerText = "RATIO Φ : " + data.ratio_phi;
            updateLed('gauge-rupture', Math.min(stress, 100));
            document.getElementById('stress-status').innerText = "STRESS : " + stress.toFixed(1) + "%";
            document.getElementById('buhs-val').style.color = stress > 100 ? '#ff3131' : '#39ff14';

        } catch (error) {
            document.getElementById('buhs-val').innerText = "ERREUR SERVEUR";
        }
    }
    createGauges(); calc();
</script>
</body>
</html>
