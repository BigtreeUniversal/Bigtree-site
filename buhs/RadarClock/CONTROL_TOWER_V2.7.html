<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Bigtree Control Tower v2.7 - Smart Mobile UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-black: #050505;
      --card-dark: #0d0d0d;
      --accent-copper: #b87333;
      --accent-red: rgba(255, 0, 0, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 20px;
    }

    .main-station { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; }

    /* --- PANNEAU TOP --- */
    .top-panel {
      background: var(--card-dark);
      border: 1px solid var(--glass-border);
      border-radius: 40px; padding: 30px;
      display: grid; grid-template-columns: 1fr 2fr 1fr;
      align-items: center; gap: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }

    /* --- HORLOGE RADAR --- */
    .clock-wrapper { position: relative; width: 360px; height: 360px; margin: 0 auto; }
    #sunClock {
      width: 100%; height: 100%;
      border-radius: 50%; border: 10px solid #1a1a1a;
      background: #000 url("clockmap2.png") no-repeat center/cover;
      position: relative; overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
    }
    .hand-sun {
      position: absolute; top: 50%; left: 50%;
      width: 2px; height: 45%;
      background: linear-gradient(to top, var(--accent-copper), #fff);
      transform-origin: center bottom; z-index: 10;
    }
    .hand-radar {
      position: absolute; top: 50%; left: 50%;
      width: 1px; height: 90%;
      background: var(--accent-red);
      transform-origin: center center;
      transform: translate(-50%, -50%); z-index: 5;
    }
    .pivot {
      position: absolute; top: 50%; left: 50%;
      width: 8px; height: 8px; background: #fff;
      border-radius: 50%; transform: translate(-50%, -50%); z-index: 15;
    }

    /* --- NAVIGATION & RADIO --- */
    .nav-links { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .btn-tool {
      text-decoration: none; font-size: 0.7rem; color: #666; text-transform: uppercase;
      letter-spacing: 1px; border: 1px solid #222; padding: 6px 14px;
      border-radius: 15px; transition: 0.3s; width: 120px; text-align: center; cursor: pointer;
    }
    .btn-tool:hover { color: var(--accent-copper); border-color: var(--accent-copper); }

    .radio-control { text-align: center; background: rgba(255,255,255,0.01); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); }
    .btn-row { display: flex; justify-content: center; gap: 15px; align-items: center; }
    .btn-retro {
      background: linear-gradient(145deg, #1e1e1e, #111111);
      border: 1px solid #2a2a2a; color: #888;
      width: 50px; height: 50px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .btn-main { width: 65px; height: 65px; font-family: 'Bebas Neue'; font-size: 1.2rem; color: var(--accent-copper); }
    .active { background: var(--accent-copper) !important; color: #fff !important; }

    /* --- SECTION VIDEO --- */
    .video-section { background: #000; border: 1px solid var(--glass-border); border-radius: 40px; overflow: hidden; position: relative; }
    .iframe-container { position: relative; width: 100%; padding-top: 56.25%; }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* --- OVERLAY COMMANDES (PC & MOBILE) --- */
    .cam-overlay {
      position: absolute; inset: 0; padding: 30px; z-index: 100;
      background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    /* Sur PC, on garde le hover */
    @media (min-width: 951px) {
        .video-section:hover .cam-overlay { opacity: 1; pointer-events: auto; }
        #mobileCamToggle { display: none; }
    }
    
    /* Sur Mobile, on utilise une classe active */
    .cam-overlay.mobile-open { opacity: 1; pointer-events: auto; }

    #mobileCamToggle {
        position: absolute; bottom: 20px; right: 20px; z-index: 50;
        background: var(--accent-copper); color: white; border: none;
        padding: 10px 15px; border-radius: 20px; font-family: 'Bebas Neue';
        cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .cam-meta { text-align: center; margin-bottom: 20px; }
    .cam-meta h2 { font-family: 'Bebas Neue'; font-size: 2.5rem; color: #fff; }
    .cam-meta p { color: var(--accent-copper); font-size: 1rem; text-transform: uppercase; }

    #chatPanel { display: none; background: var(--card-dark); border-radius: 40px; padding: 20px; margin-top: 20px; border: 1px solid var(--glass-border); }

    @media (max-width: 950px) {
      .top-panel { grid-template-columns: 1fr; }
      .clock-wrapper { width: 220px; height: 220px; }
      .nav-links { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .btn-tool { width: auto; min-width: 90px; }
      .cam-meta h2 { font-size: 1.8rem; }
    }
  </style>
</head>

  let camIdx = 0; let radIdx = 0; let autoTimer = null; let isPlaying = false;
  const audio = document.getElementById('audioPlayer');

  // FONCTION MOBILE SPECIFIQUE
  function toggleMobileCamUI() {
      document.getElementById('camOverlay').classList.toggle('mobile-open');
  }

  function updateCamDisplay() {
    const cam = cams[camIdx];
    document.getElementById('videoWrapper').innerHTML = `<iframe src="https://www.youtube.com/embed/${cam.id}?autoplay=1&mute=1&rel=0&controls=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    document.getElementById('camTitle').innerText = cam.title;
    document.getElementById('camLocation').innerText = cam.loc;
  }
  
  function changeCam(dir) { camIdx = (camIdx + dir + cams.length) % cams.length; updateCamDisplay(); }
  
  function toggleAuto() {
    const btn = document.getElementById('autoBtn');
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; btn.classList.remove('active'); }
    else { autoTimer = setInterval(() => changeCam(1), 30000); btn.classList.add('active'); changeCam(1); }
  }

  function toggleRadio() {
    const btn = document.getElementById('radioPlay');
    if (!isPlaying && radIdx !== 0) {
      audio.src = radioStations[radIdx].url;
      audio.play(); btn.innerText = "■"; document.getElementById('radioName').innerText = "📻 " + radioStations[radIdx].name; isPlaying = true;
    } else {
      audio.pause(); btn.innerText = "▶"; document.getElementById('radioName').innerText = "RADIO: OFF"; isPlaying = false;
    }
  }
  function radioNext() { radIdx = (radIdx + 1) % radioStations.length; if(isPlaying) { isPlaying=false; toggleRadio(); }}
  function radioPrev() { radIdx = (radIdx - 1 + radioStations.length) % radioStations.length; if(isPlaying) { isPlaying=false; toggleRadio(); }}

  function updateClock() {
    const now = new Date();
    const hUTC = now.getUTCHours();
    const mUTC = now.getUTCMinutes();
    const sUTC = now.getUTCSeconds();
    const sunAngle = ((hUTC % 24) + mUTC / 60 + sUTC / 3600) * 15;
    document.getElementById("sunHand").style.transform = `translate(-50%, -100%) rotate(${sunAngle}deg)`;
    document.getElementById("radarHand").style.transform = `translate(-50%, -50%) rotate(${sunAngle + 90}deg)`;
    const pad = v => v.toString().padStart(2, '0');
    document.getElementById('digitalClock').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }

  function openJukebox() { window.open("https://bigtreeconnection.com/jukebox/index.html", "BuhsJukebox", "width=450,height=700"); }
  function toggleChat() {
    const p = document.getElementById('chatPanel');
    p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    if(p.style.display === 'none') window.scrollTo({top:0, behavior:'smooth'});
    else p.scrollIntoView({behavior:'smooth'});
  }

  setInterval(updateClock, 1000);
  updateClock();
  updateCamDisplay();
