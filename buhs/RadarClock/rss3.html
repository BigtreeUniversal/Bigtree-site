<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archives – BigTree Newsletter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Variables de couleurs : Mode Clair par défaut */
    :root {
      --bg-color: #ffffff;
      --text-main: #000000;
      --text-muted: #666666;
      --border-color: #e5e7eb;
      --card-bg: #ffffff;
      --btn-bg: #000000;
      --btn-text: #ffffff;
    }

    /* MODE SOMBRE AUTOMATIQUE (Style Paragraph.xyz) */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #050505; /* Noir très profond */
        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        --border-color: #27272a; /* Gris très sombre */
        --card-bg: #09090b;
        --btn-bg: #ffffff;
        --btn-text: #000000;
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      transition: background-color 0.3s ease;
    }

    header {
      text-align: center;
      padding: 5rem 1rem 3rem;
      border-bottom: 1px solid var(--border-color);
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0;
    }

    header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    main {
      max-width: 1100px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      display: grid;
      gap: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, border-color 0.2s ease;
      text-decoration: none; /* Pour que toute la carte soit cliquable */
      color: inherit;
    }

    .card:hover {
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }

    .card img.thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-bottom: 1px solid var(--border-color);
    }

    .card-content {
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1.25rem;
      margin: 0 0 0.5rem 0;
      line-height: 1.4;
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0;
    }

    footer {
      text-align: center;
      padding: 4rem 1rem;
      border-top: 1px solid var(--border-color);
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      margin: 0 0.5rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>BigTree Archives</h1>
    <p>Toutes nos publications Paragraph</p>
  </header>

  <main id="newsletter-list">
    </main>

  <footer>
    <a href="https://paragraph.xyz/@bigtree.buhs" target="_blank">Paragraph</a> •
    <a href="mailto:bigtreeuniversal@proton.me">Contact</a>
  </footer>

  <script>
  async function loadRSS() {
    const rssUrl = "https://paragraph.xyz/@bigtree.buhs/feed"; 
    const container = document.getElementById("newsletter-list");

    try {
      const response = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl));
      const data = await response.json();

      if (!data.items || data.items.length === 0) {
        container.innerHTML = "<p>Aucune publication trouvée.</p>";
        return;
      }

      container.innerHTML = ""; 

      data.items.forEach(item => { 
        const card = document.createElement("a");
        card.href = item.link;
        card.target = "_blank";
        card.className = "card";
        
        // Image de secours si l'article n'en a pas
        const image = item.thumbnail || 'https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=800&q=80';
        
        card.innerHTML = `
          <img src="${image}" alt="" class="thumb">
          <div class="card-content">
            <h2>${item.title}</h2>
            <p>${item.description.replace(/<[^>]*>?/gm, '').substring(0, 110)}...</p>
          </div>
        `;
        container.appendChild(card);
      });
    } catch (err) {
      container.innerHTML = "<p>Erreur de connexion au flux Paragraph.</p>";
    }
  }
  loadRSS();
  </script>
</body>
</html>
