<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BigTree Jukebox - BUHS</title>
    <style>
        :root {
            --bg: #000;
            --surface: #0a0a0a;
            --accent: #1db954;
            --text: #eee;
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Nav - Hauteur fixe */
        .header { 
            height: 60px; display: flex; gap: 12px; overflow-x: auto; 
            padding: 0 15px; align-items: center; border-bottom: 1px solid #111;
            flex-shrink: 0; scrollbar-width: none;
        }
        .header::-webkit-scrollbar { display: none; }
        
        .chip { 
            background: #111; padding: 8px 16px; border-radius: 20px; 
            font-size: 11px; white-space: nowrap; cursor: pointer; color: #666;
        }
        .chip.active { background: var(--accent); color: #000; font-weight: bold; }

        /* Now Playing - Hauteur fixe */
        #now-playing { 
            padding: 15px; background: var(--surface); flex-shrink: 0;
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #111;
        }
        #big-thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #222; }

        /* Playlist - Zone flexible */
        #playlist-view { flex-grow: 1; overflow-y: auto; background: var(--bg); }
        .track-item { 
            display: flex; align-items: center; padding: 12px 20px; gap: 15px; 
            border-bottom: 1px solid #080808; cursor: pointer;
        }
        .track-item.active { background: #050505; border-left: 4px solid var(--accent); }
        .track-item img { width: 45px; height: 35px; border-radius: 4px; object-fit: cover; opacity: 0.4; }

        /* Contrôles - Fixés en bas */
        .controls { 
            height: 100px; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center; gap: 40px; 
            border-top: 1px solid #1a1a1a; flex-shrink: 0;
        }
        .btn-play { background: #fff; color: #000; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; border:none; }
        .btn-nav { background: none; border: none; color: #fff; font-size: 32px; }

        #player-container { position: absolute; top: -1000px; }
    </style>
</head>
<body>

    <div class="header" id="nav"></div>

    <div id="now-playing">
        <img id="big-thumb" src="">
        <div style="flex:1; overflow:hidden;">
            <div id="current-title" style="color:var(--accent); font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">SÉLECTIONNEZ UNE PLAYLIST</div>
            <div style="font-size:10px; color:#666; margin-top:4px;">BUHS PROJECT</div>
        </div>
    </div>

    <div id="playlist-view"></div>
    <div id="player-container"><div id="player"></div></div>

    <div class="controls">
        <button class="btn-nav" onclick="player.previousVideo()">⏮</button>
        <button class="btn-play" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="btn-nav" onclick="player.nextVideo()">⏭</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const myPlaylists = [
            { name: "REGGAE MODERN", id: "PL9D-qI9DCdypGs8n_c1OCUiTsLhGIymVS" },
            { name: "REGGAE CLASSICS", id: "PL9D-qI9DCdypFiwBzbGQwXw2JIwbbNkWb" },
            { name: "JAZZ 1", id: "PL9D-qI9DCdyqxLpZu6LRo4mpr6Gd_zwe3" },
            { name: "HIPHOP OLD", id: "PL9D-qI9DCdyo5zA9ip_PUOswT5utKMP63" },
            { name: "SOUL R & B", id: "PL9D-qI9DCdyqrriTLtefKRw7Xhp26x_g2" },
            { name: "VARIOUS", id: "PL9D-qI9DCdyquTkdVKSsias9oCACu5hBD" }   
        ];

        let player;

        const nav = document.getElementById('nav');
        myPlaylists.forEach((pl, i) => {
            const btn = document.createElement('div');
            btn.className = 'chip' + (i === 0 ? ' active' : '');
            btn.innerText = pl.name;
            btn.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                player.loadPlaylist({list: pl.id});
            };
            nav.appendChild(btn);
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { listType: 'playlist', list: myPlaylists[0].id },
                events: {
                    'onReady': () => { updateUI(); },
                    'onStateChange': (e) => {
                        document.getElementById('play-btn').innerText = (e.data == 1) ? "⏸" : "▶";
                        updateUI();
                    }
                }
            });
        }

        function updateUI() {
            const data = player.getVideoData();
            const list = player.getPlaylist();
            const currIdx = player.getPlaylistIndex();

            if(data && data.title) {
                document.getElementById('current-title').innerText = data.title;
                document.getElementById('big-thumb').src = `https://img.youtube.com/vi/${data.video_id}/hqdefault.jpg`;
            }

            const view = document.getElementById('playlist-view');
            if(list) {
                view.innerHTML = '';
                list.forEach((id, index) => {
                    const item = document.createElement('div');
                    item.className = 'track-item' + (index === currIdx ? ' active' : '');
                    item.innerHTML = `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"><div style="font-size:12px;">${index === currIdx ? data.title : 'Titre ' + (index+1)}</div>`;
                    item.onclick = () => player.playVideoAt(index);
                    view.appendChild(item);
                });
            }
        }

        function togglePlay() {
            if (player.getPlayerState() == 1) player.pauseVideo();
            else player.playVideo();
        }
    </script>
</body>
</html>
