<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BigTree Jukebox - BUHS Edition</title>
    
    <style>
        :root {
            --bronze: #a67c52;
            --dark-metal: #2c2c2c;
            --leather: #3d2b1f;
            --glow: #ffaa00;
            --bg-color: #0a0a0a;
        }

        body { 
            margin: 0; 
            background: var(--bg-color); 
            color: #d4af37; 
            font-family: 'Courier New', Courier, monospace;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BOITIER PRINCIPAL */
        .machine {
            width: 90%;
            max-width: 380px;
            background: var(--dark-metal);
            border: 6px solid #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 60px #000, inset 0 2px 5px rgba(255,255,255,0.1);
            position: relative;
        }

        /* ECRAN & COVER */
        .screen-frame {
            background: #111;
            border: 5px solid var(--bronze);
            border-radius: 8px;
            padding: 10px;
            position: relative;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px #000;
            overflow: hidden;
        }

        /* Effet Scanlines (vieil écran) */
        .screen-frame::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #big-thumb { 
            width: 100%; 
            aspect-ratio: 16/10;
            object-fit: cover;
            border-radius: 4px; 
            border: 1px solid #333;
            filter: sepia(0.2) contrast(1.1);
        }

        #current-title {
            font-size: 13px;
            font-weight: bold;
            margin-top: 10px;
            height: 36px;
            overflow: hidden;
            color: var(--glow);
            text-align: center;
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* VUMETRE */
        .vu-container {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }
        .vu-meter {
            width: 100px; height: 50px; 
            background: #eedd82;
            border-radius: 50px 50px 0 0;
            position: relative; 
            border: 2px solid #555; 
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        .vu-needle {
            position: absolute; bottom: 0; left: 50%;
            width: 2px; height: 40px; background: #e60000;
            transform-origin: bottom center;
            transform: rotate(-45deg);
            transition: transform 0.15s ease-out;
        }

        /* PLAYLISTS (Boutons Laiton) */
        .grid-nav { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 25px; 
        }
        .pl-btn {
            background: linear-gradient(145deg, #8e6d45, #5d4037);
            border: 2px solid #2a1a0a;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            padding: 10px 5px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 3px 0 #1a1a1a;
        }
        .pl-btn.active {
            background: var(--glow);
            color: #000;
            box-shadow: 0 0 15px var(--glow), inset 0 0 5px rgba(255,255,255,0.5);
            transform: translateY(2px);
        }

        /* PANEL COMMANDES (Cuir) */
        .panel-controls {
            background: var(--leather);
            border: 2px solid #1a1a1a;
            border-radius: 12px;
            padding: 20px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: inset 0 0 15px #000;
        }

        .dial-knob {
            width: 35px; height: 35px;
            background: radial-gradient(circle, #666, #222);
            border: 2px solid #000;
            border-radius: 50%;
            position: relative;
        }
        .dial-knob::after {
            content: ""; position: absolute; top: 5px; left: 50%;
            width: 2px; height: 8px; background: var(--glow); transform: translateX(-50%);
        }

        .btn-transport {
            width: 50px; height: 50px;
            background: linear-gradient(145deg, #eee, #999);
            border: 3px solid #333;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #111;
        }
        .btn-transport:active { transform: translateY(3px); box-shadow: 0 1px 0 #111; }
        
        .btn-play { width: 65px; height: 65px; font-size: 24px; color: #000; }

        /* PLAYER HIDDEN */
        #yt-player-container { position: absolute; top: -1000px; left: -1000px; }
    </style>
</head>
<body>

    <div class="machine">
        <div class="screen-frame">
            <img id="big-thumb" src="https://via.placeholder.com/400x250?text=BUHS+SYSTEM">
            <div id="current-title">SÉLECTIONNEZ UNE SOURCE</div>
            
            <div class="vu-container">
                <div class="vu-meter">
                    <div class="vu-needle" id="needle"></div>
                </div>
            </div>
        </div>

        <div class="grid-nav" id="nav"></div>

        <div class="panel-controls">
            <div class="dial-knob"></div>
            <button class="btn-transport" onclick="player.previousVideo()">⏮</button>
            <button class="btn-transport btn-play" id="play-btn" onclick="togglePlay()">▶</button>
            <button class="btn-transport" onclick="player.nextVideo()">⏭</button>
            <div class="dial-knob"></div>
        </div>
    </div>

    <div id="yt-player-container"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const myPlaylists = [
            { name: "Reggae Modern", id: "PL9D-qI9DCdypGs8n_c1OCUiTsLhGIymVS" },
            { name: "Reggae Classic", id: "PL9D-qI9DCdypFiwBzbGQwXw2JIwbbNkWb" },
            { name: "Jazz Select", id: "PL9D-qI9DCdyqxLpZu6LRo4mpr6Gd_zwe3" },
            { name: "HipHop Old", id: "PL9D-qI9DCdyo5zA9ip_PUOswT5utKMP63" },
            { name: "Soul R&B", id: "PL9D-qI9DCdyqrriTLtefKRw7Xhp26x_g2" },
            { name: "Various", id: "PL9D-qI9DCdyquTkdVKSsias9oCACu5hBD" }
        ];

        let player;
        let needleTimer;

        // Générer les boutons de playlist
        const nav = document.getElementById('nav');
        myPlaylists.forEach((pl, i) => {
            const btn = document.createElement('button');
            btn.className = 'pl-btn' + (i === 0 ? ' active' : '');
            btn.innerText = pl.name;
            btn.onclick = () => {
                document.querySelectorAll('.pl-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // Chargement forcé pour mobile
                player.loadPlaylist({
                    list: pl.id,
                    listType: 'playlist',
                    index: 0
                });
            };
            nav.appendChild(btn);
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 
                    listType: 'playlist', 
                    list: myPlaylists[0].id,
                    origin: window.location.origin
                },
                events: {
                    'onStateChange': (e) => {
                        const btn = document.getElementById('play-btn');
                        if (e.data == YT.PlayerState.PLAYING) {
                            btn.innerText = "⏸";
                            updateUI();
                            startNeedle();
                        } else {
                            btn.innerText = "▶";
                            stopNeedle();
                        }
                    },
                    'onError': () => player.nextVideo()
                }
            });
        }

        function updateUI() {
            const data = player.getVideoData();
            if(data && data.title) {
                document.getElementById('current-title').innerText = data.title;
                // Version HQ pour éviter le flou
                document.getElementById('big-thumb').src = `https://img.youtube.com/vi/${data.video_id}/hqdefault.jpg`;
            }
        }

        function togglePlay() {
            const state = player.getPlayerState();
            if (state == 1) player.pauseVideo();
            else player.playVideo();
        }

        // Animation du vumètre
        function startNeedle() {
            if(needleTimer) clearInterval(needleTimer);
            needleTimer = setInterval(() => {
                const randomAngle = Math.floor(Math.random() * 50) - 25; // Oscillation -25 à 25 deg
                document.getElementById('needle').style.transform = `rotate(${randomAngle}deg)`;
            }, 200);
        }

        function stopNeedle() {
            clearInterval(needleTimer);
            document.getElementById('needle').style.transform = `rotate(-45deg)`;
        }
    </script>
</body>
</html>
