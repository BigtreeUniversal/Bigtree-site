<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BigTree Jukebox - BUHS Retro</title>
    
    <style>
        :root {
            --bronze: #8e6d45;
            --dark-metal: #2c2c2c;
            --leather: #4a2c1d;
            --screen-bg: #121212;
            --accent-glow: #00f2ff;
        }

        body { 
            margin: 0; 
            background: #050505; 
            color: #ccc; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* BOITIER PRINCIPAL */
        #jukebox {
            width: 380px;
            background: var(--dark-metal);
            border: 4px solid #1a1a1a;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            padding: 20px;
            position: relative;
        }

        /* ÉCRAN (Le haut de ton image) */
        .screen-container {
            background: #1a1a1a;
            border: 8px solid var(--bronze);
            border-radius: 5px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 0 20px #000;
            margin-bottom: 20px;
        }

        #big-thumb { 
            width: 100%; 
            aspect-ratio: 1/1;
            object-fit: cover; 
            border: 2px solid #333;
            filter: sepia(0.3) contrast(1.1);
            margin-bottom: 10px;
        }

        #current-title {
            color: var(--accent-glow);
            font-size: 14px;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--accent-glow);
            height: 40px;
            overflow: hidden;
        }

        /* NAVIGATION (Chips transformés en boutons laiton) */
        .header { 
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .chip { 
            background: linear-gradient(145deg, #555, #222);
            padding: 6px; 
            border-radius: 4px; 
            font-size: 9px; 
            cursor: pointer; 
            color: #aaa;
            border: 1px solid #000;
            text-align: center;
        }
        .chip.active { 
            background: var(--bronze);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(142, 109, 69, 0.5);
        }

        /* SECTION CONTRÔLES (Look Cuir) */
        .controls-panel {
            background: var(--leather);
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #222;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .btn { 
            background: linear-gradient(145deg, #eee, #999);
            border: 3px solid #444; 
            color: #222; 
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 4px 0 #222;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #222;
        }
        .btn-play { 
            width: 70px;
            height: 70px;
            font-size: 24px;
        }

        /* PLAYLIST CACHÉE (S'affiche au clic sur l'écran ?) */
        #playlist-view {
            max-height: 150px;
            overflow-y: auto;
            font-size: 11px;
            margin-top: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }
        .track-item { padding: 8px; border-bottom: 1px solid #333; cursor: pointer; }
        .track-item.active { color: var(--bronze); background: #111; }

        #player-container { position: absolute; top: -1000px; }
    </style>
</head>
<body>

    <div id="jukebox">
        <div class="screen-container">
            <img id="big-thumb" src="https://via.placeholder.com/300x300?text=BIG+TREE">
            <div id="current-title">INITIALISATION...</div>
            <div style="font-size: 9px; color: #666; margin-top: 5px;">SÉLECTIONNEZ UNE SOURCE</div>
        </div>

        <div class="header" id="nav"></div>

        <div class="controls-panel">
            <button class="btn" onclick="player.previousVideo()">◀◀</button>
            <button class="btn btn-play" id="play-btn" onclick="togglePlay()">▶</button>
            <button class="btn" onclick="player.nextVideo()">▶▶</button>
        </div>

        <div id="playlist-view"></div>
    </div>
    
    <div id="player-container"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const myPlaylists = [
            { name: "REGGAE MOD", id: "PL9D-qI9DCdypGs8n_c1OCUiTsLhGIymVS" },
            { name: "CLASSICS", id: "PL9D-qI9DCdypFiwBzbGQwXw2JIwbbNkWb" },
            { name: "JAZZ 1", id: "PL9D-qI9DCdyqxLpZu6LRo4mpr6Gd_zwe3" },
            { name: "HIPHOP", id: "PL9D-qI9DCdyo5zA9ip_PUOswT5utKMP63" },
            { name: "SOUL", id: "PL9D-qI9DCdyqrriTLtefKRw7Xhp26x_g2" },
            { name: "VARIOUS", id: "PL9D-qI9DCdyquTkdVKSsias9oCACu5hBD" }   
        ];

        let player;

        // Création des boutons de playlist
        const nav = document.getElementById('nav');
        myPlaylists.forEach((pl, i) => {
            const btn = document.createElement('div');
            btn.className = 'chip' + (i === 0 ? ' active' : '');
            btn.innerText = pl.name;
            btn.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                player.loadPlaylist({list: pl.id});
            };
            nav.appendChild(btn);
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { listType: 'playlist', list: myPlaylists[0].id },
                events: {
                    'onReady': () => {
                        // Récupère les titres dès le chargement
                        setTimeout(updateUI, 1000);
                    },
                    'onStateChange': (e) => {
                        const playBtn = document.getElementById('play-btn');
                        if (e.data == YT.PlayerState.PLAYING) {
                            playBtn.innerText = "⏸";
                            updateUI();
                        } else {
                            playBtn.innerText = "▶";
                        }
                    }
                }
            });
        }

        function updateUI() {
            const data = player.getVideoData();
            const list = player.getPlaylist();
            const currIdx = player.getPlaylistIndex();

            if(data && data.title) {
                document.getElementById('current-title').innerText = data.title;
                // Utilisation de la version HQ pour une cover plus grande
                document.getElementById('big-thumb').src = `https://img.youtube.com/vi/${data.video_id}/hqdefault.jpg`;
            }

            const view = document.getElementById('playlist-view');
            view.innerHTML = '';
            if(list) {
                // On affiche les 5 prochains titres
                list.forEach((id, index) => {
                    if(index >= currIdx && index < currIdx + 5) {
                        const item = document.createElement('div');
                        item.className = 'track-item' + (index === currIdx ? ' active' : '');
                        item.innerText = (index === currIdx) ? "● " + data.title : "○ Titre suivant...";
                        item.onclick = () => player.playVideoAt(index);
                        view.appendChild(item);
                    }
                });
            }
        }

        function togglePlay() {
            if (player.getPlayerState() == 1) player.pauseVideo();
            else player.playVideo();
        }
    </script>
</body>
</html>
