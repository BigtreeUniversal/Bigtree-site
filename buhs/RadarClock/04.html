<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>BigTree Jukebox - BUHS Edition</title>
    
    <style>
        :root {
            --bg-color: #000000;
            --surface: #0a0a0a;
            --accent-color: #1db954; 
            --text-main: #eeeeee;
            --text-dim: #666666;
            --nav-height: 60px;
        }

        body { 
            margin: 0; 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* NAVIGATION */
        .header { 
            height: var(--nav-height);
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            padding: 0 15px; 
            align-items: center;
            background: var(--bg-color); 
            flex-shrink: 0;
            border-bottom: 1px solid #111;
            scrollbar-width: none;
        }
        .header::-webkit-scrollbar { display: none; }
        
        .chip { 
            background: #111; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 11px; 
            white-space: nowrap; 
            border: 1px solid #222; 
            cursor: pointer; 
            color: var(--text-dim); 
            text-transform: uppercase; 
        }
        .chip.active { 
            background: var(--accent-color); 
            color: #000; 
            border-color: var(--accent-color); 
            font-weight: bold;
        }

        /* LECTEUR (Correction : Cover plus grande) */
        #now-playing { 
            padding: 20px; 
            background: linear-gradient(to bottom, var(--surface), #000);
            flex-shrink: 0;
            display: flex;
            flex-direction: column; /* Changement pour mettre la cover en avant */
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #111;
        }
        #big-thumb { 
            width: 180px; /* Agrandissement */
            height: 180px; 
            object-fit: cover; 
            border-radius: 12px; 
            border: 2px solid #222;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
        }
        #current-info {
            text-align: center;
            width: 100%;
        }
        #current-title { 
            font-size: 16px; 
            font-weight: bold;
            color: var(--accent-color); 
        }

        /* PLAYLIST */
        #playlist-view { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding-bottom: 100px;
            background: var(--bg-color);
        }
        .track-item { 
            display: flex; 
            align-items: center; 
            padding: 12px 20px; 
            gap: 15px; 
            border-bottom: 1px solid #080808; 
            cursor: pointer;
        }
        .track-item.active { 
            background: #080808; 
            border-left: 4px solid var(--accent-color); 
        }
        .track-item img { width: 50px; height: 40px; border-radius: 4px; object-fit: cover; }

        /* COMMANDES */
        .controls { 
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px 0 30px 0; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 30px; 
            border-top: 1px solid #1a1a1a;
        }
        .btn { background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; }
        .btn-play { 
            background: #fff; 
            color: #000; 
            width: 55px; height: 55px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; 
        }

        #player-container { position: absolute; top: -1000px; }
    </style>
</head>
<body>

    <div class="header" id="nav"></div>

    <div id="now-playing">
        <img id="big-thumb" src="https://via.placeholder.com/180?text=BUHS">
        <div id="current-info">
            <div id="current-title">CHARGEMENT...</div>
        </div>
    </div>

    <div id="playlist-view"></div>
    <div id="player-container"><div id="player"></div></div>

    <div class="controls">
        <button class="btn" onclick="player.previousVideo()">⏮</button>
        <button class="btn btn-play" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="btn" onclick="player.nextVideo()">⏭</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const myPlaylists = [
            { name: "REGGAE MODERN", id: "PL9D-qI9DCdypGs8n_c1OCUiTsLhGIymVS" },
            { name: "REGGAE CLASSICS", id: "PL9D-qI9DCdypFiwBzbGQwXw2JIwbbNkWb" },
            { name: "JAZZ 1", id: "PL9D-qI9DCdyqxLpZu6LRo4mpr6Gd_zwe3" },
            { name: "HIPHOP OLD", id: "PL9D-qI9DCdyo5zA9ip_PUOswT5utKMP63" },
            { name: "SOUL R & B", id: "PL9D-qI9DCdyqrriTLtefKRw7Xhp26x_g2" },
            { name: "VARIOUS", id: "PL9D-qI9DCdyquTkdVKSsias9oCACu5hBD" }   
        ];

        let player;

        const nav = document.getElementById('nav');
        myPlaylists.forEach((pl, i) => {
            const btn = document.createElement('div');
            btn.className = 'chip' + (i === 0 ? ' active' : '');
            btn.innerText = pl.name;
            btn.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                player.loadPlaylist({list: pl.id});
            };
            nav.appendChild(btn);
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { listType: 'playlist', list: myPlaylists[0].id },
                events: {
                    'onReady': () => { updateUI(); }, // Correction : Affichage dès que c'est prêt
                    'onStateChange': (e) => {
                        document.getElementById('play-btn').innerText = (e.data == 1) ? "⏸" : "▶";
                        updateUI();
                    }
                }
            });
        }

        function updateUI() {
            const data = player.getVideoData();
            const list = player.getPlaylist();
            const currIdx = player.getPlaylistIndex();

            if(data && data.title) {
                document.getElementById('current-title').innerText = data.title;
                // Correction : Image HQ et nette
                document.getElementById('big-thumb').src = `https://img.youtube.com/vi/${data.video_id}/hqdefault.jpg`;
            }

            const view = document.getElementById('playlist-view');
            view.innerHTML = '';
            if(list) {
                list.forEach((id, index) => {
                    const item = document.createElement('div');
                    item.className = 'track-item' + (index === currIdx ? ' active' : '');
                    item.innerHTML = `
                        <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
                        <div class="track-label">${index + 1}. ${index === currIdx ? data.title : 'TITRE SUIVANT'}</div>
                    `;
                    item.onclick = () => player.playVideoAt(index);
                    view.appendChild(item);
                });
                const activeItem = document.querySelector('.track-item.active');
                if(activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function togglePlay() {
            if (player.getPlayerState() == 1) player.pauseVideo();
            else player.playVideo();
        }
    </script>
</body>
</html>
