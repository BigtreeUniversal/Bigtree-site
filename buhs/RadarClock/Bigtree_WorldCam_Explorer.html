<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Bigtree World Cam Explorer - Control Tower 2.1</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121931;
      --text: #e7ecff;
      --sub: #9fb0ff;
      --accent: #7aa2ff;
      --alert: #ff004c;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(1200px 800px at 80% -10%, #14214a 0%, var(--bg) 40%, #080c1a 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- ZONE HORLOGE ET NAVIGATION --- */
    .clock-zone {
      position: relative;
      width: 100%;
      max-width: 440px;
      margin: 20px auto 10px;
      padding: 30px;
    }

    .clock-frame {
      position: relative;
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
    }

    #sunClock {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid gold;
      box-shadow: 0 0 15px rgba(255,215,0,0.5);
      background: #000 url("clockmap2.jpg") no-repeat center/cover;
      overflow: hidden;
      isolation: isolate;
    }

    #sunClock::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(
        circle at var(--sun-x, 50%) var(--sun-y, 50%),
        rgba(255, 236, 140, 0.55) 0%,
        rgba(255, 236, 140, 0) 26%
      );
      mix-blend-mode: screen;
      z-index: 1;
    }

    .corner-btn {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(18, 25, 49, 0.9);
      border: 1px solid var(--accent);
      border-radius: 12px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      z-index: 10;
      text-decoration: none;
      transition: 0.2s;
    }
    .corner-btn:hover { background: var(--accent); color: var(--bg); transform: scale(1.1); }

    .top-left { top: 10px; left: 10px; }
    .top-right { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; border-color: #ff9f00; }
    .bottom-right { bottom: 10px; right: 10px; border-color: #ff9f00; }

    .hand.hour {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 50%;
      background: gold;
      transform-origin: center bottom;
      z-index: 2;
    }
    .hand.hour::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform: translate(-50%, 50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: gold;
      box-shadow: 0 0 15px yellow;
    }

    /* --- BOUTON CLIGNOTANT 2.0 --- */
    .btn-alert-2 {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      margin: 10px 0 20px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #fff;
      background: linear-gradient(45deg, var(--alert), #ff6b00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 15px rgba(255, 0, 76, 0.4);
      transition: 0.3s;
      animation: pulse-glow 1.5s infinite;
    }

    @keyframes pulse-glow {
      0% { box-shadow: 0 0 0 0 rgba(255, 0, 76, 0.7); transform: scale(1); }
      70% { box-shadow: 0 0 0 12px rgba(255, 0, 76, 0); transform: scale(1.03); }
      100% { box-shadow: 0 0 0 0 rgba(255, 0, 76, 0); transform: scale(1); }
    }

    .btn-alert-2::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 8px #fff;
      animation: blink-dot 0.6s infinite;
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* --- LECTEUR WEBCAM --- */
    .viewer-container {
      width: 100%;
      max-width: 900px;
      padding: 10px;
    }
    .cam-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 15px 15px 10px;
      background: rgba(0,0,0,0.3);
    }
    
    .extra-tools {
      display: flex;
      gap: 10px;
      padding: 0 15px 15px;
      background: rgba(0,0,0,0.3);
    }
    
    .btn-tool {
      flex: 1;
      padding: 10px;
      font-size: 11px;
      font-weight: bold;
      font-family: monospace;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(122, 162, 255, 0.3);
      border-radius: 6px;
      color: var(--sub);
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    .btn-tool:hover { background: rgba(122, 162, 255, 0.2); border-color: var(--accent); color: #fff; }

    button {
      padding: 12px 5px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: rgba(122,162,255,0.1);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
    }
    #autoBtn.active { background: #e62117; }
    
    .meta-bar {
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #radioStatus { color: #ff9f00; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
  </style>
</head>

  function updateRadio() {
    if (radioIdx === 0) {
      audio.pause();
      audio.src = "";
      rStatus.innerText = "RADIO : OFF";
    } else {
      const cacheBuster = "?v=" + Date.now();
      audio.src = radioStations[radioIdx].url + cacheBuster;
      audio.play().then(() => {
        rStatus.innerText = "📻 " + radioStations[radioIdx].name;
      }).catch((e) => {
        rStatus.innerText = "CLIQUEZ POUR ACTIVER";

  }
  function radioNext() { radioIdx = (radioIdx + 1) % radioStations.length; updateRadio(); }
  function radioPrev() { radioIdx = (radioIdx - 1 + radioStations.length) % radioStations.length; updateRadio(); }

  // 3. HORLOGE 24H
  function updateClock() {
    const now = new Date();
    const h = now.getUTCHours();
    const m = now.getUTCMinutes();
    const hoursFloat = (h % 24) + m/60;
    const hourDeg = hoursFloat * 15;
    document.getElementById("hourHand").style.transform = `translate(-50%, -100%) rotate(${hourDeg}deg)`;
    const theta = hourDeg * Math.PI / 180;
    const x = 50 + Math.sin(theta) * 25;
    const y = 50 - Math.cos(theta) * 25;
    const clockEl = document.getElementById("sunClock");
    clockEl.style.setProperty("--sun-x", x + "%");
    clockEl.style.setProperty("--sun-y", y + "%");
    document.getElementById('digitalClock').innerText = now.toLocaleTimeString();
  }
