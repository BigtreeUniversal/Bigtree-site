<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigTree Jukebox PRO</title>

<style>
:root{
--bg:#000;
--surface:#0f0f0f;
--accent:#1db954;
--text:#fff;
--dim:#888;
}

*{box-sizing:border-box;}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* NAV */
.header{
display:flex;
overflow-x:auto;
gap:10px;
padding:12px;
border-bottom:1px solid #111;
flex-shrink:0;
}

.header::-webkit-scrollbar{display:none;}

.chip{
background:#111;
padding:8px 14px;
border-radius:20px;
font-size:12px;
white-space:nowrap;
cursor:pointer;
color:#aaa;
}

.chip.active{
background:var(--accent);
color:#000;
font-weight:bold;
}

/* NOW PLAYING */
#now-playing{
display:flex;
gap:15px;
padding:15px;
background:var(--surface);
border-bottom:1px solid #111;
flex-shrink:0;
}

#thumb{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
}

#title{
font-weight:bold;
color:var(--accent);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* PLAYLIST */
#playlist{
flex:1;
overflow-y:auto;
}

.track{
display:flex;
align-items:center;
gap:12px;
padding:12px 16px;
border-bottom:1px solid #111;
cursor:pointer;
}

.track img{
width:60px;
height:45px;
object-fit:cover;
border-radius:6px;
opacity:.6;
}

.track.active{
background:#111;
border-left:4px solid var(--accent);
}

.track.active img{
opacity:1;
}

/* CONTROLS */
.controls{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:18px;
background:#0a0a0a;
border-top:1px solid #111;
flex-shrink:0;
}

button{
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

.play{
background:white;
color:black;
width:60px;
height:60px;
border-radius:50%;
font-size:22px;
}
</style>
</head>
<body>

<div class="header" id="nav"></div>

<div id="now-playing">
<img id="thumb">
<div style="flex:1">
<div id="title">Sélectionnez une playlist</div>
<div style="font-size:12px;color:#888">BigTree Radio</div>
</div>
</div>

<div id="playlist"></div>

<div class="controls">
<button onclick="safePrev()">⏮</button>
<button class="play" id="playBtn" onclick="toggle()">▶</button>
<button onclick="safeNext()">⏭</button>
</div>

<div id="player" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const playlists=[
{ name:"REGGAE MODERN", id:"PL9D-qI9DCdypGs8n_c1OCUiTsLhGIymVS"},
{ name:"REGGAE CLASSICS", id:"PL9D-qI9DCdypFiwBzbGQwXw2JIwbbNkWb"},
{ name:"JAZZ 1", id:"PL9D-qI9DCdyqxLpZu6LRo4mpr6Gd_zwe3"},
{ name:"HIPHOP OLD", id:"PL9D-qI9DCdyo5zA9ip_PUOswT5utKMP63"}
];

let player;
let ready=false;

const nav=document.getElementById("nav");

playlists.forEach((pl,i)=>{
const chip=document.createElement("div");
chip.className="chip"+(i===0?" active":"");
chip.innerText=pl.name;
chip.onclick=()=>{
if(!ready) return;
document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
chip.classList.add("active");
player.loadPlaylist({listType:"playlist",list:pl.id});
};
nav.appendChild(chip);
});

function onYouTubeIframeAPIReady(){
player=new YT.Player("player",{
height:"0",
width:"0",
playerVars:{
listType:"playlist",
list:playlists[0].id
},
events:{
onReady:()=>{
ready=true;
refresh();
},
onStateChange:e=>{
document.getElementById("playBtn").innerText=
e.data===YT.PlayerState.PLAYING?"⏸":"▶";
refresh();
}
}
});
}

function refresh(){
if(!ready) return;

const data=player.getVideoData();
const list=player.getPlaylist();
const idx=player.getPlaylistIndex();

if(data && data.video_id){
document.getElementById("title").innerText=data.title;
document.getElementById("thumb").src=
"https://img.youtube.com/vi/"+data.video_id+"/hqdefault.jpg";
}

const container=document.getElementById("playlist");
container.innerHTML="";

if(!list) return;

list.forEach((id,i)=>{
const div=document.createElement("div");
div.className="track"+(i===idx?" active":"");
div.innerHTML=
'<img src="https://img.youtube.com/vi/'+id+'/mqdefault.jpg">'+
'<div style="flex:1">Piste '+(i+1)+'</div>';
div.onclick=()=>player.playVideoAt(i);
container.appendChild(div);
});
}

function toggle(){
if(!ready) return;
player.getPlayerState()===YT.PlayerState.PLAYING
?player.pauseVideo()
:player.playVideo();
}

function safeNext(){
if(ready) player.nextVideo();
}

function safePrev(){
if(ready) player.previousVideo();
}
</script>

</body>
</html>
