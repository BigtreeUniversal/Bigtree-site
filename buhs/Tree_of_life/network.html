    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Permet de caler le footer naturellement en bas */
            overflow-x: hidden;
            padding: 20px;
        }

        /* Arrière-plan style console Matrix / Lignes CRT */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            z-index: 10;
        }

        header h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
            margin-bottom: 10px;
        }

        header p {
            color: #008f11;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 143, 17, 0.5);
        }

        /* Conteneur principal de l'Arbre */
        .tree-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 750px;
            margin: 0 auto flex-grow; /* Permet de centrer verticalement entre le header et le footer */
            
            /* --- CONFIGURATION DE L'IMAGE DE L'ARBRE DE VIE --- */
            background-image: url('04.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }

        /* SVG pour tracer les sentiers */
        .tree-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .tree-svg line {
            stroke: rgba(0, 255, 65, 0.3);
            stroke-width: 2;
            stroke-dasharray: 4 4;
            animation: pulseLine 3s infinite alternate;
        }

        @keyframes pulseLine {
            0% { stroke: rgba(0, 255, 65, 0.2); stroke-width: 2; }
            100% { stroke: rgba(0, 143, 17, 0.6); stroke-width: 2.5; }
        }

        /* Style des Sephirots */
        .sephiroth {
            position: absolute;
            z-index: 5;
            transform: translate(-50%, -50%);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 110px;
        }

        .sephiroth-node {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4), inset 0 0 10px rgba(0, 255, 65, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .sephiroth-node::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 255, 65, 0.4);
            transition: all 0.4s ease;
        }

        .sephiroth-label {
            margin-top: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ff41;
            text-align: center;
            min-width: 160px;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
            transition: color 0.3s ease;
        }

        /* Hover Effects */
        .sephiroth:hover .sephiroth-node {
            background: #00ff41;
            border-color: #00ff41;
            box-shadow: 0 0 25px #00ff41, 0 0 40px #00ff41;
            transform: scale(1.12);
            color: #000000;
            text-shadow: none;
        }

        .sephiroth:hover .sephiroth-label {
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff;
        }

        .sephiroth:hover .sephiroth-node::after {
            transform: rotate(90deg);
            border-color: #000000;
        }

        /* Positions spécifiques de l'Arbre de Vie */
        #s1 { top: 7%; left: 50%; }
        #s1 .sephiroth-node { border-color: #ffffff; color: #ffffff; box-shadow: 0 0 15px rgba(255,255,255,0.6); text-shadow: 0 0 5px #ffffff; }
        #s2 { top: 18%; left: 80%; }
        #s3 { top: 18%; left: 20%; }
        #s4 { top: 38%; left: 80%; }
        #s5 { top: 38%; left: 20%; }
        #s6 { top: 48%; left: 50%; }
        #s6 .sephiroth-node { border-color: #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.6); }
        #s7 { top: 58%; left: 80%; }
        #s8 { top: 58%; left: 20%; }
        #s9 { top: 68%; left: 50%; }
        #s10 { top: 88%; left: 50%; }
        #s10 .sephiroth-node { border-color: #008f11; color: #008f11; box-shadow: 0 0 15px rgba(0, 143, 17, 0.4); text-shadow: 0 0 5px #008f11; }

        /* --- STYLE DES BOUTONS DISCRETS EN BAS DE PAGE --- */
        footer {
            margin-top: 30px;
            margin-bottom: 10px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .footer-btn {
            color: #008f11;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            padding: 6px 12px;
            border: 1px solid rgba(0, 143, 17, 0.4);
            background: rgba(0, 0, 0, 0.6);
            border-radius: 3px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .footer-btn:hover {
            color: #00ff41;
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.05);
            cursor: pointer;
        }

        /* Responsive */
        @media (max-height: 850px) {
            .tree-container {
                height: 660px;
                transform: scale(0.88);
                transform-origin: top center;
            }
            header { margin-bottom: 10px; }
            footer { margin-top: 15px; }
        }
    </style>
