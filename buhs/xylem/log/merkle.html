<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ XYLEM HUB // MERKLE CORE BIGTREE ]</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: black;
            color: #00ff00;
            font-family: monospace;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.96; } 50% { opacity: 1; } 100% { opacity: 0.98; }
        }
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background: repeating-linear-gradient(to bottom, rgba(0, 255, 0, 0.07), rgba(0, 255, 0, 0.07) 1px, transparent 1px, transparent 3px);
        }
        .box {
            border: 1px solid #00ff00; padding: 16px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); background: #030303;
        }
        
        /* Animation d'apparition ligne par ligne pour l'arbre */
        .tree-line {
            white-space: pre;
            opacity: 0;
            animation: fadeInLine 0.4s ease-out forwards;
        }
        @keyframes fadeInLine {
            to { opacity: 1; }
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>

<body class="p-6">
<div class="max-w-4xl mx-auto">

    <div class="mb-4">
        <a href="https://bigtreeconnection.com/buhs/BUHS_Livre-blanc.txt" class="border border-green-500 px-3 py-1 text-xs hover:bg-green-500 hover:text-black font-bold">Read Me</a>
    </div>

    <h1 class="text-xl mb-6" style="text-shadow: 0 0 10px #00ff00;">[ SYSTEM_MONITOR // MERKLE_TREE_STRUCTURE ] <span class="blink">_</span></h1>
    
    <div class="box text-sm">
        <p class="text-green-400 font-bold">> CLOCK SOURCE : CHRONY_STRATUM_1 (LOCAL_SERVER_ATOM)</p>
        <p class="text-green-500">> TIME_SYNC    : PROT_NTP_OK // MAXIMUM_PRECISION_ENABLED</p>
        <p class="mt-2 text-md font-bold text-white font-mono">> HORLOGE LIVE : <span id="atomic-clock" class="text-green-400">00:00:00 UTC</span></p>
    </div>

    <div class="box font-mono text-xs md:text-sm overflow-x-auto leading-relaxed">
        <p class="text-green-600 mb-2">// INITIALIZING NETWORK MERKLE SCAN...</p>
        
        <div id="merkle-tree-container">
            </div>
    </div>

</div>

<script>
// 1. GESTION DE L'HORLOGE ATOMIQUE EN DIRECT
function updateClock() {
    const now = new Date();
    // On force l'affichage au format UTC (Heure universelle précise du réseau)
    const timeString = now.toUTCString().replace("GMT", "UTC");
    document.getElementById('atomic-clock').innerText = timeString;
}
setInterval(updateClock, 1000);
updateClock();

// 2. DESIGN ET LOGIQUE DE L'ARBRE DIGITAL RETRO (Animation ligne par ligne)
const treeData = [
    "[ROOT_CHAIN] ── e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855",
    "   │",
    "   ├── [EPOCH_JULI] ── (ROOT_JUILLET_2026_ACTIVE)",
    "   │      ├── [NODE_03] ── QmYwAP7tUnji... (AWAITING_CRON_GEN) ── ⏳ STATUS: PENDING",
    "   │      ├── [NODE_02] ── QmV6gmmZGp3k... (2026-07-02 02:00) ── ✅ ATOMIC_VALID",
    "   │      └── [NODE_01] ── QmajrGxWTcny... (2026-07-01 01:00) ── ✅ ATOMIC_VALID",
    "   │",
    "   └── [EPOCH_JUNE] ── (ROOT_JUIN_2026_ARCHIVE)",
    "          ├── [NODE_30] ── QmP83NHLffxh... (2026-06-30 23:00) ── 🔒 FROZEN_BLOCK",
    "          ├── [NODE_29] ── QmUroiqzg8CT... (2026-06-29 18:00) ── 🔒 FROZEN_BLOCK",
    "          └── [NODE_28] ── Qmc5oppueT9d... (2026-06-28 02:00) ── 🔒 FROZEN_BLOCK",
    "",
    "[SYS_STATUS] ── INTEG_CHECK: SUCCESSFUL // NO_MODIFICATION_DETECTED"
];

const container = document.getElementById('merkle-tree-container');

// Affiche chaque branche du terminal avec un léger décalage pour simuler un chargement d'ordinateur des années 90
treeData.forEach((lineText, index) => {
    const lineElement = document.createElement('div');
    lineElement.className = 'tree-line';
    lineElement.textContent = lineText === "" ? " " : lineText;
    
    // Change la couleur selon le texte pour faire plus pro
    if (lineText.includes("✅")) lineElement.classList.add('text-green-400');
    if (lineText.includes("🔒")) lineElement.classList.add('text-green-700');
    if (lineText.includes("⏳")) lineElement.classList.add('text-yellow-500', 'blink');
    if (lineText.includes("[ROOT_CHAIN]")) lineElement.classList.add('text-white', 'font-bold');
    
    // Délai progressif (150ms par ligne)
    lineElement.style.animationDelay = `${index * 150}ms`;
    
    container.appendChild(lineElement);
});
</script>

</body>
</html>
