<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Webcams Fix</title>
  <style>
    /* On garde TOUT ton style d'origine */
    :root { --bg: #0b1020; --card: #121931; --text: #e7ecff; --sub: #9fb0ff; --accent: #7aa2ff; --radius: 18px; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; padding: 20px; max-width: 1200px; margin: auto; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    .video-wrap { aspect-ratio: 16 / 9; position: relative; }
    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    
    /* Le focus sur la caméra active */
    .card.active { border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(122,162,255,0.4); transform: scale(1.02); }

    /* Tes nouveaux contrôles */
    .nav-bar { position: sticky; top: 0; background: rgba(11, 16, 32, 0.9); padding: 15px; display: flex; justify-content: center; gap: 10px; z-index: 100; backdrop-filter: blur(5px); }
    button { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: white; cursor: pointer; }
    button.active { background: #e62117; border-color: #e62117; }
  </style>
</head>
<body>

  <div class="nav-bar">
    <button onclick="navigate(-1)">⬅ Précédent</button>
    <button id="autoBtn" onclick="toggleAuto()">MODE AUTO : OFF</button>
    <button onclick="navigate(1)">Suivant ➡</button>
  </div>

  <main class="grid" id="mainGrid">
    <section class="card active">
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/gIv9J38Dax8?enablejsapi=1" allowfullscreen></iframe>
      </div>
    </section>

    <section class="card">
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/sQxL8t0gtu8?enablejsapi=1" allowfullscreen></iframe>
      </div>
    </section>

    <section class="card">
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/TsgoxkRFit0?enablejsapi=1" allowfullscreen></iframe>
      </div>
    </section>

    <section class="card">
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/CXYr04BWvmc?enablejsapi=1" allowfullscreen></iframe>
      </div>
    </section>
  </main>

<script>
    let currentIdx = 0;
    let autoInterval = null;
    const cards = document.querySelectorAll('.card');

    function navigate(dir) {
        // Enlève le style actif de l'ancienne carte
        cards[currentIdx].classList.remove('active');
        
        // Calcule le nouvel index
        currentIdx = (currentIdx + dir + cards.length) % cards.length;
        
        // Active la nouvelle carte et scrolle jusqu'à elle
        cards[currentIdx].classList.add('active');
        cards[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function toggleAuto() {
        const btn = document.getElementById('autoBtn');
        if (autoInterval) {
            clearInterval(autoInterval);
            autoInterval = null;
            btn.innerText = "MODE AUTO : OFF";
            btn.classList.remove('active');
        } else {
            btn.innerText = "MODE AUTO : ON";
            btn.classList.add('active');
            autoInterval = setInterval(() => navigate(1), 60000);
        }
    }
</script>
</body>
</html>
