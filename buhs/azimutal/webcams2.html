<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cam Explorer - LIVE</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #e62117; /* Rouge YouTube */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Vidéo Responsif */
        .video-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            background: #000;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Barre de contrôle */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #1e1e1e;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .cam-info {
            text-align: center;
            min-width: 200px;
        }

        #camName {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: #fff;
        }

        .status {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            padding: 12px 20px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: #333;
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { background: #444; }
        button:active { transform: scale(0.9); }

        .btn-auto {
            font-size: 0.9rem;
            padding: 10px 20px;
            border: 2px solid #444;
            background: transparent;
        }

        .btn-auto.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(230, 33, 23, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(230, 33, 23, 0); }
            100% { box-shadow: 0 0 0 0px rgba(230, 33, 23, 0); }
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .controls { gap: 10px; padding: 10px; }
            button { padding: 10px 15px; font-size: 1.2rem; }
            #camName { font-size: 1rem; }
            .btn-auto { font-size: 0.7rem; padding: 8px 12px; }
        }
    </style>
</head>
<body>

<div class="video-container">
    <iframe id="camFrame" 
            src="" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
    </iframe>
</div>

<div class="controls">
    <button onclick="changeCam(-1)" title="Précédent">❮</button>
    
    <div class="cam-info">
        <div id="camName">Chargement...</div>
        <div class="status" id="camStatus">-- / --</div>
    </div>

    <button onclick="changeCam(1)" title="Suivant">❯</button>
    
    <button id="autoBtn" class="btn-auto" onclick="toggleAuto()">MODE AUTO : OFF</button>
</div>

<script>
    // Ta liste mise à jour avec tes liens YouTube
    const camList = [
        { name: "Sydney", id: "jshwkG1ZpP8?si=9Kibt1TOLGiyG2_b" },
        { name: "The Windmill Bar -  St. John, USVI", id: "K_FOP7_wGPE" },
        { name: "Namibia Desert", id: "ydYDqZQpim8" },
        { name: "San Francisco-Oakland Bay Bridge ", id: "CXYr04BWvmc" },
        { name: "Niagara Falls", id: "qx7gry390YA" }
        { name: "Statue of Liberty", id: "cWR8KGKftUw" }
        { name: "Terminal Tower Cam (Cleveland, OH", id: "iHqqkh_Lths" }
        { name: "Tamariu, Spain", id: "PMhVgTcDd1o" }
        { name: "Aquarium Cam (Baltimore, Maryland)", id: "_5zWp0bMgcI" }
        { name: "SUMMIT One Vanderbilt (New York City, NY)", id: "2_PDaUJbfuI" }
        { name: "Anglins Pier (Lauderdale-By-The-Sea, FL)", id: "iHqqkh_Lths" }
        { name: "Allegiant Stadium (Las Vegas, NV)", id: "_rmUXOHSf0w" }
        { name: "Fort Myers, FL", id: "skM8DTCx3gM" }
    ];

    let currentIndex = 0;
    let autoInterval = null;
    const frame = document.getElementById('camFrame');
    const camName = document.getElementById('camName');
    const camStatus = document.getElementById('camStatus');

    function loadCam(index) {
        currentIndex = (index + camList.length) % camList.length;
        const cam = camList[currentIndex];
        
        camName.innerText = cam.name;
        camStatus.innerText = `Lieu ${currentIndex + 1} sur ${camList.length}`;
        
        // On construit l'URL YouTube embed avec Autoplay et Mute
        // Le mute est obligatoire pour que la vidéo se lance sans clic utilisateur
        const newSrc = `https://www.youtube.com/embed/${cam.id}?autoplay=1&mute=1&rel=0`;
        
        // On ne recharge l'iframe que si la source change
        if (frame.src !== newSrc) {
            frame.src = newSrc;
        }
    }

    function changeCam(direction) {
        loadCam(currentIndex + direction);
        if (autoInterval) resetAutoTimer();
    }

    function toggleAuto() {
        const btn = document.getElementById('autoBtn');
        if (autoInterval) {
            clearInterval(autoInterval);
            autoInterval = null;
            btn.innerText = "MODE AUTO : OFF";
            btn.classList.remove('active');
        } else {
            btn.innerText = "MODE AUTO : ON";
            btn.classList.add('active');
            autoInterval = setInterval(() => changeCam(1), 60000); // Change chaque minute
        }
    }

    function resetAutoTimer() {
        clearInterval(autoInterval);
        autoInterval = setInterval(() => changeCam(1), 60000);
    }

    // Lancement de la première caméra au chargement
    loadCam(0);
</script>

</body>
</html>
